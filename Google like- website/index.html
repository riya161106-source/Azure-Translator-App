<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azure Translator Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <div class="card">
        <h1>🌐 Translator Pro</h1>
        <p class="subtitle">Powered by Azure AI</p>

        <!-- Credentials -->
        <div class="credentials">
            <input type="text" id="apiKey" placeholder="Azure API Key">
            <input type="text" id="region" placeholder="Region (e.g. centralindia)">
        </div>

        <!-- Input -->
        <textarea id="inputText" placeholder="Type your text here..."></textarea>

        <!-- Controls -->
        <div class="controls">
            <select id="fromLang">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
            </select>

            <button class="swap" onclick="swapLang()">⇄</button>

            <select id="toLang">
                <option value="hi">Hindi</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
            </select>
        </div>

        <button class="translate-btn" onclick="translateText()">Translate</button>

        <!-- Output -->
        <textarea id="outputText" placeholder="Translation will appear here..." readonly></textarea>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
