<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <div class="card">
        <h1>🌐 AI Translator</h1>
        <p class="subtitle">Translate customer feedback instantly using Azure</p>

        <div class="form-group">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="Enter your Azure API Key">
        </div>

        <div class="form-group">
            <label>Region</label>
            <input type="text" id="region" placeholder="e.g., centralindia">
        </div>

        <div class="form-group">
            <label>Input Text</label>
            <textarea id="inputText" placeholder="Type or paste feedback in any language..."></textarea>
        </div>

        <button onclick="translateText()">Translate to English</button>

        <div class="output-box">
            <h3>Translated Output</h3>
            <p id="output">Your translated text will appear here...</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
